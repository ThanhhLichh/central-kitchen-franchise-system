version: '3.8'

services:
  # ===== MySQL Database =====
  production-db:
    image: mysql:8.0
    container_name: mysql_production_service
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-production_db}
      MYSQL_USER: ${MYSQL_USER:-devuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - production_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== ASP.NET Core API =====
  production-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=production-db;Port=3306;Database=${MYSQL_DATABASE:-production_db};User=${MYSQL_USER:-devuser};Password=${MYSQL_PASSWORD:-devpassword};
    depends_on:
      production-db:
        condition: service_healthy
    networks:
      - production_network

# ===== Volumes =====
volumes:
  db_data:
    driver: local

# ===== Network =====
networks:
  production_network:
    driver: bridge