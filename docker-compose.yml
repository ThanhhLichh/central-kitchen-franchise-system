services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: franchise_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: franchise_redis
    restart: always
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: franchise_sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_Strong_Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql

  order_mysql:
    image: mysql:8.0
    container_name: order_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass123
    ports:
      - "3307:3306"
    volumes:
      - order_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory_postgres:
    image: postgres:14
    container_name: inventory_postgres
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5444:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  delivery_mysql:
    image: mysql:8.0
    container_name: delivery_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: delivery_db
      MYSQL_USER: delivery_user
      MYSQL_PASSWORD: delivery_password
    ports:
      - "3308:3306"
    volumes:
      - delivery_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  production-db:
    image: mysql:8.0
    container_name: production_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: production_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3309:3306"
    volumes:
      - production_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  authservice:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: franchise_authservice
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_started
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FranchiseAuthDb;User Id=sa;Password=Your_Strong_Password123!;TrustServerCertificate=True;"
      ConnectionStrings__RedisCache: "redis:6379"
    volumes:
    - ./AuthService/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order_service_app
    restart: always
    env_file:
      - ./order-service/.env
    ports:
      - "3001:3001"
    depends_on:
      order_mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: dockerfile
    container_name: inventory_service
    restart: always
    env_file:
      - ./inventory-service/.env
    environment:
      DB_HOST: inventory_postgres
      DB_PORT: 5432
      DB_NAME: inventory_db
      DB_USER: postgres
      DB_PASSWORD: 123456
      RABBITMQ_HOST: rabbitmq
    ports:
      - "5003:5000"
    depends_on:
      inventory_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery_service_app
    restart: always
    env_file:
      - ./delivery-service/.env
    ports:
      - "5005:5005"
    depends_on:
      delivery_mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  production-api:
    build:
      context: ./production-service
      dockerfile: Dockerfile
    container_name: production_api
    restart: always
    ports:
      - "5006:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=production-db;Port=3306;Database=production_db;User=devuser;Password=devpassword;"
    depends_on:
      production-db:
        condition: service_healthy

  api-gateway:
    image: nginx:alpine
    container_name: franchise_api_gateway
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - authservice
      - order-service
      - inventory-service
      - delivery-service
      - production-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: franchise_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  sqlvolume:
  order_mysql_data:
  inventory_postgres_data:
  delivery_mysql_data:
  production_mysql_data: